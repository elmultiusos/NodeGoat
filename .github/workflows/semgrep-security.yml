name: Semgrep Security Analysis

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  semgrep:
    name: SAST - Semgrep Security Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep SAST (SARIF)
        run: |
          semgrep scan \
            --config p/javascript \
            --config p/nodejs \
            --config p/owasp-top-ten \
            --config p/security-audit \
            --config p/xss \
            --config p/sql-injection \
            --sarif \
            --output semgrep.sarif \
            . || true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

      - name: Run Semgrep (JSON for metrics)
        run: |
          semgrep scan \
            --config p/javascript \
            --config p/nodejs \
            --config p/owasp-top-ten \
            --config p/security-audit \
            --json \
            --output semgrep-results.json \
            . || true

      - name: Generate Security Metrics Report
        if: always()
        run: |
          python3 << 'SCRIPT'
          import json

          with open("semgrep-results.json", "r") as f:
              data = json.load(f)

          results = data.get("results", [])
          errors = data.get("errors", [])

          # Count by severity
          severity_count = {"ERROR": 0, "WARNING": 0, "INFO": 0}
          for r in results:
              sev = r.get("extra", {}).get("severity", "INFO")
              severity_count[sev] = severity_count.get(sev, 0) + 1

          # Count by category/rule
          rule_count = {}
          for r in results:
              rule_id = r.get("check_id", "unknown")
              rule_count[rule_id] = rule_count.get(rule_id, 0) + 1

          # Count by file
          file_count = {}
          for r in results:
              path = r.get("path", "unknown")
              file_count[path] = file_count.get(path, 0) + 1

          # OWASP categories
          owasp_map = {
              "injection": "A03:2021 Injection",
              "sql": "A03:2021 Injection",
              "xss": "A03:2021 Injection (XSS)",
              "auth": "A07:2021 Auth Failures",
              "crypto": "A02:2021 Crypto Failures",
              "ssrf": "A10:2021 SSRF",
              "deserial": "A08:2021 Integrity Failures",
              "access-control": "A01:2021 Broken Access Control",
              "security-misc": "A05:2021 Security Misconfiguration",
          }

          owasp_count = {}
          for r in results:
              rule = r.get("check_id", "").lower()
              matched = False
              for key, owasp in owasp_map.items():
                  if key in rule:
                      owasp_count[owasp] = owasp_count.get(owasp, 0) + 1
                      matched = True
                      break
              if not matched:
                  owasp_count["Other"] = owasp_count.get("Other", 0) + 1

          total = len(results)

          # Generate report
          report = []
          report.append("=" * 70)
          report.append("   SEMGREP SECURITY METRICS REPORT - NodeGoat")
          report.append("   Metricas y KPIs de Seguridad en el SDLC")
          report.append("=" * 70)
          report.append("")
          report.append(f"Total findings: {total}")
          report.append(f"Files analyzed: {len(file_count)}")
          report.append(f"Rules matched:  {len(rule_count)}")
          report.append(f"Scan errors:    {len(errors)}")
          report.append("")

          report.append("-" * 50)
          report.append("KPI 1: Findings by Severity")
          report.append("-" * 50)
          for sev in ["ERROR", "WARNING", "INFO"]:
              count = severity_count.get(sev, 0)
              pct = (count / total * 100) if total > 0 else 0
              bar = "#" * int(pct / 2)
              report.append(f"  {sev:10s}: {count:4d} ({pct:5.1f}%) {bar}")
          report.append("")

          report.append("-" * 50)
          report.append("KPI 2: OWASP Top 10 Coverage")
          report.append("-" * 50)
          for owasp, count in sorted(owasp_count.items(), key=lambda x: -x[1]):
              pct = (count / total * 100) if total > 0 else 0
              report.append(f"  {owasp:45s}: {count:3d} ({pct:5.1f}%)")
          report.append("")

          report.append("-" * 50)
          report.append("KPI 3: Top 10 Most Vulnerable Files")
          report.append("-" * 50)
          for path, count in sorted(file_count.items(), key=lambda x: -x[1])[:10]:
              report.append(f"  {path:50s}: {count:3d} findings")
          report.append("")

          report.append("-" * 50)
          report.append("KPI 4: Top 15 Rules Triggered")
          report.append("-" * 50)
          for rule, count in sorted(rule_count.items(), key=lambda x: -x[1])[:15]:
              short_rule = rule.split(".")[-1] if "." in rule else rule
              report.append(f"  {short_rule:50s}: {count:3d}")
          report.append("")

          # Security score
          critical = severity_count.get("ERROR", 0)
          high = severity_count.get("WARNING", 0)
          score = max(0, 100 - (critical * 10) - (high * 3))
          report.append("-" * 50)
          report.append("KPI 5: Security Score")
          report.append("-" * 50)
          report.append(f"  Score: {score}/100")
          if score >= 80:
              report.append("  Status: PASS")
          elif score >= 50:
              report.append("  Status: NEEDS IMPROVEMENT")
          else:
              report.append("  Status: FAIL - Critical issues found")
          report.append("")
          report.append("=" * 70)

          output = "\n".join(report)
          print(output)

          with open("semgrep-metrics-report.txt", "w") as f:
              f.write(output)

          # Also save structured metrics as JSON
          metrics = {
              "total_findings": total,
              "files_analyzed": len(file_count),
              "rules_matched": len(rule_count),
              "severity": severity_count,
              "owasp_coverage": owasp_count,
              "security_score": score,
              "top_files": dict(sorted(file_count.items(), key=lambda x: -x[1])[:10]),
              "top_rules": dict(sorted(rule_count.items(), key=lambda x: -x[1])[:15]),
          }
          with open("semgrep-metrics.json", "w") as f:
              json.dump(metrics, f, indent=2)

          SCRIPT

      - name: Upload Metrics Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-security-metrics
          path: |
            semgrep-results.json
            semgrep-metrics-report.txt
            semgrep-metrics.json
          retention-days: 30
